<!DOCTYPE html>
<html>
<head>
  <title>Auth</title>
</head>
<body style="background:black;color:white;text-align:center">

<h2>Register</h2>

<input id="name" placeholder="Name"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="sendOTP()">Send OTP</button><br><br>

<input id="otp" placeholder="Enter OTP"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<hr>

<h2>Login</h2>

<input id="loginEmail" placeholder="Email"><br><br>
<input id="loginPassword" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script>
const BASE = "/api";

// SEND OTP
async function sendOTP() {
  const email = document.getElementById("email").value;

  const res = await fetch(BASE + "/send-otp", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email })
  });

  const data = await res.json();
  alert(data.message);
}

// REGISTER
async function register() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const otp = document.getElementById("otp").value;

  const res = await fetch(BASE + "/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name, email, password, otp })
  });

  const data = await res.json();
  alert(data.message);
}

// LOGIN
async function login() {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const res = await fetch(BASE + "/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if(res.ok){
    localStorage.setItem("token", data.token);
    window.location.href = "/index.html";
  } else {
    alert(data.message);
  }
}
</script>

</body>
</html>
